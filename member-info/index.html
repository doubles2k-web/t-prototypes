<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="회원 정보 관리">
  <meta name="theme-color" content="#000000">
  <title>회원 정보 관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body, #root { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif; }
    ::-webkit-scrollbar { display: none; }
    input::placeholder { color: #808080; opacity: 1; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- ★ 공용 킷 불러오기 -->
  <script src="../shared/tving-kit.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ★ 킷에서 필요한 것만 꺼내기
    const {
      colors, Screen, SectionLabel, InputField, DisabledField,
      ListGroup, ListItem, ActionButton, PrimaryButton, TVINGLogo,
    } = T;

    function App() {
      const [activeField, setActiveField] = useState(null);
      const [emailValue, setEmailValue] = useState("seodk****@tving.com");
      const [emailInput, setEmailInput] = useState("seodk****@tving.com");
      const [emailError, setEmailError] = useState(false);
      const [phoneEditing, setPhoneEditing] = useState(false);
      const [phoneValue] = useState("010-****-8842");
      const [phoneInput, setPhoneInput] = useState("010-****-8842");
      const [phoneSent, setPhoneSent] = useState(false);
      const [verifyCode, setVerifyCode] = useState("");
      const [verifyStatus, setVerifyStatus] = useState(null);
      const [timer, setTimer] = useState(179);
      const timerRef = useRef(null);
      const [toast, setToast] = useState(null);

      const emailInputRef = useRef(null);
      const phoneInputRef = useRef(null);
      const verifyInputRef = useRef(null);
      const scrollRef = useRef(null);
      const emailRef = useRef(null);
      const phoneRef = useRef(null);
      const verifyRef = useRef(null);

      // Timer
      useEffect(() => {
        if (phoneSent && verifyStatus === "pending" && timer > 0) {
          timerRef.current = setInterval(() => setTimer(t => t - 1), 1000);
          return () => clearInterval(timerRef.current);
        }
        if (timer <= 0) clearInterval(timerRef.current);
      }, [phoneSent, verifyStatus, timer]);

      const formatTimer = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
      const formatPhone = (raw) => {
        const d = raw.replace(/[^0-9]/g,"");
        if (d.length <= 3) return d;
        if (d.length <= 7) return d.slice(0,3)+"-"+d.slice(3);
        return d.slice(0,3)+"-"+d.slice(3,7)+"-"+d.slice(7,11);
      };

      const centerField = useCallback((ref) => {
        if (!scrollRef.current || !ref?.current) return;
        setTimeout(() => {
          const c = scrollRef.current;
          const top = ref.current.offsetTop;
          const h = ref.current.offsetHeight;
          c.scrollTo({ top: Math.max(0, top - c.clientHeight/2 + h/2), behavior: "smooth" });
        }, 300);
      }, []);

      // Focus
      const handleEmailFocus = () => { setActiveField("email"); setEmailInput(emailValue); setEmailError(false); centerField(emailRef); };
      const handleVerifyFocus = () => { if (verifyStatus === "success") return; setActiveField("verify"); centerField(verifyRef); };

      // Blur
      const handleBlur = (field) => {
        setTimeout(() => {
          setActiveField(prev => {
            if (prev !== field) return prev;
            if (field === "phone" && !phoneSent) { setPhoneEditing(false); setPhoneInput(phoneValue); }
            return null;
          });
        }, 200);
      };

      // Clear
      const handleEmailClear = () => { setEmailInput(""); setEmailError(false); emailInputRef.current?.focus(); };
      const handlePhoneClear = () => { setPhoneInput(""); phoneInputRef.current?.focus(); };

      // Phone
      const handlePhoneChange = (e) => { setPhoneInput(formatPhone(e.target.value.replace(/[^0-9]/g,"").slice(0,11))); };
      const handleSendVerification = () => {
        if (phoneInput.replace(/[^0-9]/g,"").length >= 10) {
          setPhoneSent(true); setVerifyStatus("pending"); setTimer(179); setVerifyCode(""); setActiveField("verify");
          setTimeout(() => verifyInputRef.current?.focus(), 100);
        }
      };
      const handleResend = () => { setTimer(179); setVerifyCode(""); setVerifyStatus("pending"); setActiveField("verify"); setTimeout(() => verifyInputRef.current?.focus(), 100); };
      const handleVerify = () => {
        if (verifyCode === "123456") { setVerifyStatus("success"); setActiveField(null); verifyInputRef.current?.blur(); }
        else setVerifyStatus("error");
      };

      // Complete
      const handleComplete = () => {
        if (emailInput && emailInput !== emailValue) {
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput)) { setEmailError(true); setActiveField("email"); emailInputRef.current?.focus(); return; }
          setEmailValue(emailInput);
        }
        emailInputRef.current?.blur(); phoneInputRef.current?.blur(); verifyInputRef.current?.blur();
        setActiveField(null); setToast("변경사항이 저장되었습니다."); setTimeout(() => setToast(null), 2000);
      };

      const resetAll = () => {
        setActiveField(null); setPhoneEditing(false); setPhoneSent(false); setVerifyStatus(null);
        setPhoneInput(phoneValue); setEmailInput(emailValue); setEmailError(false); setVerifyCode("");
        emailInputRef.current?.blur(); phoneInputRef.current?.blur(); verifyInputRef.current?.blur();
      };

      const buttonEnabled = verifyStatus === "success" || emailValue !== "seodk****@tving.com";
      const isEditing = activeField !== null || phoneEditing;

      // ★ Screen 컴포넌트로 감싸기만 하면 NavBar + 스크롤 + HomeIndicator + Toast 자동 처리
      return (
        <Screen title="회원 정보 관리" onBack={resetAll} toast={toast} scrollRef={scrollRef}>

          <div style={{ height: 12 }} />

          {/* 아이디 */}
          <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 12 }}>
            <SectionLabel label="아이디" />
            <DisabledField value="tving2025" leftIcon={<TVINGLogo />} />
          </div>

          {/* 비밀번호 */}
          {!isEditing ? (
            <ListGroup title="비밀번호"><ListItem label="비밀번호 변경" onClick={() => setToast("비밀번호 변경 화면으로 이동합니다.")} /></ListGroup>
          ) : (
            <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 12 }}>
              <SectionLabel label="비밀번호" />
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", height: 52, padding: "0 16px", background: colors.gray200, borderRadius: 12 }}>
                <span style={{ fontSize: 16, color: colors.white }}>비밀번호 변경</span>
                <T.ArrowRight />
              </div>
            </div>
          )}

          {/* 이름 */}
          <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 12 }}>
            <SectionLabel label="이름" />
            <InputField value="심*경" disabled={true} />
          </div>

          {/* 이메일 */}
          <div ref={emailRef} style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 12 }}>
            <SectionLabel label="이메일" />
            <InputField value={emailInput} placeholder="이메일 주소" inputRef={emailInputRef} inputType="email" inputMode="email" focused={activeField==="email"} error={emailError} onChange={(e)=>{setEmailInput(e.target.value);setEmailError(false);}} onFocus={handleEmailFocus} onBlur={()=>handleBlur("email")} onClear={handleEmailClear} showClear={true} caption={emailError?"올바른 이메일 주소를 입력해 주세요.":null} captionColor={colors.errorRed} />
          </div>

          {/* 휴대폰 번호 */}
          <div ref={phoneRef} style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 12 }}>
            <SectionLabel label="휴대폰 번호" />
            <div style={{ display: "flex", gap: phoneEditing ? 12 : 0, transition: "gap 0.2s ease" }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <InputField value={phoneEditing?phoneInput:phoneValue} placeholder="휴대폰 번호" inputRef={phoneInputRef} inputType="tel" inputMode="numeric" readOnly={phoneSent} focused={activeField==="phone"&&!phoneSent} onChange={handlePhoneChange} onFocus={()=>{if(verifyStatus==="success"||phoneSent)return;if(!phoneEditing){setPhoneEditing(true);setPhoneInput(phoneValue);}setActiveField("phone");centerField(phoneRef);}} onBlur={()=>handleBlur("phone")} onClear={handlePhoneClear} showClear={!phoneSent&&activeField==="phone"} />
              </div>
              <div style={{ width: phoneEditing?132:0, overflow:"hidden", opacity:phoneEditing?1:0, transition:"width 0.25s ease, opacity 0.2s ease", flexShrink:0 }}>
                <ActionButton label={phoneSent?"재전송":"인증번호 전송"} onClick={phoneSent?handleResend:handleSendVerification} />
              </div>
            </div>

            {phoneSent && (
              <div ref={verifyRef} style={{ display:"flex", gap:12, animation:"fadeIn 0.3s ease" }}>
                <div style={{ flex:1 }}>
                  <InputField value={verifyCode} placeholder="인증번호 6자리" inputRef={verifyInputRef} inputType="tel" inputMode="numeric" readOnly={verifyStatus==="success"} focused={activeField==="verify"&&verifyStatus!=="success"} error={verifyStatus==="error"} onChange={(e)=>{const v=e.target.value.replace(/[^0-9]/g,"").slice(0,6);setVerifyCode(v);if(verifyStatus==="error")setVerifyStatus("pending");}} onFocus={handleVerifyFocus} onBlur={()=>handleBlur("verify")} timer={verifyStatus!=="success"?formatTimer(timer):undefined} caption={verifyStatus==="success"?"인증이 완료되었습니다.":verifyStatus==="error"?"인증번호가 일치하지 않습니다.":null} captionColor={verifyStatus==="error"?colors.errorRed:colors.cyan} />
                </div>
                {verifyStatus!=="success" && <ActionButton label="인증" onClick={handleVerify} disabled={verifyCode.length!==6} />}
              </div>
            )}
          </div>

          {/* 회원 설정 */}
          <ListGroup title="회원 설정">
            <ListItem label="회원 탈퇴" onClick={() => setToast("회원 탈퇴 화면으로 이동합니다.")} />
            <ListItem label="로그아웃" onClick={() => setToast("로그아웃 처리됩니다.")} />
          </ListGroup>
          <div style={{ height: 8 }} />

          <PrimaryButton label="완료" enabled={buttonEnabled} onClick={handleComplete} />

          {activeField && <div style={{ height: 320 }} />}
          <div style={{ height: 20 }} />
        </Screen>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
